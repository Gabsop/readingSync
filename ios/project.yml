name: ReadingSync
options:
  bundleIdPrefix: com.readingsync
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  SyncCore:
    path: Packages/SyncCore
  Persistence:
    path: Packages/Persistence
  EpubReader:
    path: Packages/EpubReader
  LibraryUI:
    path: Packages/LibraryUI

targets:
  ReadingSync:
    type: application
    platform: iOS
    sources:
      - ReadingSync
    dependencies:
      - package: SyncCore
      - package: LibraryUI
      - package: EpubReader
    settings:
      base:
        INFOPLIST_FILE: ReadingSync/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.readingsync.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_STRICT_CONCURRENCY: complete
